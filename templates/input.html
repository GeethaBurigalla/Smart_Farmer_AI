<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Hub | Smart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4fbf4; font-family: 'Poppins', sans-serif; padding: 40px 20px; }
        .hub-title { color: #2e7d32; font-weight: 800; text-align: center; margin-bottom: 40px; }
        .nav-card { background: white; border-radius: 25px; padding: 30px; transition: 0.4s; border: none; height: 100%; border-bottom: 8px solid #ddd; }
        .nav-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card-crop { border-bottom-color: #2e7d32; }
        .card-mandi { border-bottom-color: #0277bd; }
        .card-disease { border-bottom-color: #c62828; }
        .mic-btn { border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border: 1px solid #ddd; color: #555; transition: 0.3s; }
        .mic-active { background: #ffebee !important; color: #d32f2f !important; border-color: #d32f2f !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .btn-go { border-radius: 12px; font-weight: bold; padding: 12px; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="hub-title">{{ t.title }}</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="nav-card card-crop shadow-sm text-center">
                <i class="fas fa-seedling fa-3x text-success mb-3"></i>
                <h4>{{ t.opt1 }}</h4>
                <p class="text-muted small">Enter Village/City or Upload SHC</p>
                <form action="/predict" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="lang" value="{{ lang }}">
                    <div class="input-group mb-2">
                        <input type="text" id="city_in" name="city" class="form-control" placeholder="Village Name">
                        <button type="button" class="mic-btn ms-2" onclick="startVoice('city_in', 'mic-1')">
                            <i id="mic-1" class="fas fa-microphone"></i>
                        </button>
                    </div>
                    <p class="small text-muted mb-1">OR Upload Card</p>
                    <input type="file" name="shc_photo" class="form-control form-control-sm mb-2" accept="image/*">
                    <button class="btn btn-success btn-go">PREDICT CROP</button>
                </form>
            </div>
        </div>

        <div class="col-md-4">
            <div class="nav-card card-mandi shadow-sm text-center">
                <i class="fas fa-store-alt fa-3x text-primary mb-3"></i>
                <h4>{{ t.opt2 }}</h4>
                <p class="text-muted small">Check Current Market Rates</p>
                <form action="/mandi_search" method="POST">
                    <input type="hidden" name="lang" value="{{ lang }}">
                    <div class="input-group mb-2">
                        <input type="text" id="mandi_in" name="crop_query" class="form-control" placeholder="Ex: Paddy/Cotton">
                        <button type="button" class="mic-btn ms-2" onclick="startVoice('mandi_in', 'mic-2')">
                            <i id="mic-2" class="fas fa-microphone"></i>
                        </button>
                    </div>
                    <button class="btn btn-primary btn-go">SEARCH PRICES</button>
                </form>
            </div>
        </div>

        <div class="col-md-4">
            <div class="nav-card card-disease shadow-sm text-center">
                <i class="fas fa-microscope fa-3x text-danger mb-3"></i>
                <h4>{{ t.opt3 }}</h4>
                <p class="text-muted small">Upload Leaf Photo for Analysis</p>
                <form action="/analyze_disease" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="lang" value="{{ lang }}">
                    <input type="file" name="leaf_image" class="form-control mb-3" accept="image/*" required>
                    <button class="btn btn-danger btn-go">SCAN DISEASE</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function startVoice(inputId, micId) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        const micIcon = document.getElementById(micId);
        
        // Language Auto-Detect
        const userLang = "{{ lang }}";
        if (userLang === "Telugu") recognition.lang = 'te-IN';
        else if (userLang === "Hindi") recognition.lang = 'hi-IN';
        else recognition.lang = 'en-IN';

        recognition.start();
        micIcon.parentElement.classList.add('mic-active');

        recognition.onresult = function(event) {
            const result = event.results[0][0].transcript;
            document.getElementById(inputId).value = result.replace(/[.]/g, '').trim();
            micIcon.parentElement.classList.remove('mic-active');
        };

        recognition.onerror = function() {
            micIcon.parentElement.classList.remove('mic-active');
            alert("Speak again...");
        };

        recognition.onspeechend = function() {
            recognition.stop();
            micIcon.parentElement.classList.remove('mic-active');
        };
    }
</script>

</body>
</html>
