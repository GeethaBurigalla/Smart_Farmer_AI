<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farmer AI | Language Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #1d976c 0%, #134e5e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }
        .language-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon-circle {
            background: #e8f5e9;
            width: 90px;
            height: 90px;
            line-height: 90px;
            border-radius: 50%;
            margin: 0 auto 25px;
            color: #1d976c;
            font-size: 35px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        .btn-continue {
            background-color: #1d976c;
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 15px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            color: white;
        }
        .btn-continue:hover {
            background-color: #147a57;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        select.form-select {
            border-radius: 12px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            transition: 0.3s;
        }
        select.form-select:focus {
            border-color: #1d976c;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="language-card">
        <div class="icon-circle">
            🌐
        </div>
        <h3 class="fw-bold mb-1">Select Language</h3>
        <p class="text-muted mb-4 small">భాషను ఎంచుకోండి / भाषा चुनें</p>

        <form action="/input" method="POST">
            <div class="mb-4 text-start">
                <select name="language" class="form-select form-select-lg">
                    <option value="English" selected>English</option>
                    <option value="Telugu">Telugu (తెలుగు)</option>
                    <option value="Hindi">Hindi (हिन्दी)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-continue w-100">
                CONTINUE →
            </button>
        </form>
        
        <div class="mt-5">
            <p class="text-muted" style="font-size: 0.75rem;">
                Google Campus Ambassador Project<br>
                Empowering Farmers with Gen-AI
            </p>
        </div>
    </div>

</body>
</html>
